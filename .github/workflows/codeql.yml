# Codacy Configuration File
# https://docs.codacy.com/repositories-configure/codacy-configuration-file

# Exclude paths dari analisis
exclude-paths:
  # Exclude library pihak ketiga
  - core/lib/tinymce
  - app/plugins/generic/pdfJsViewer
  - core/js/lib/plupload
  - app/plugins/generic/lucene
  - 'node_modules'
  - 'vendor'
  
# Exclude pola file
exclude-patterns:
  # Exclude hidden files
  - '(^|/)\\.'
  
  # Exclude build/distribution files
  - '(^|/)build/'
  - '(^|/)dist/'
  
  # Exclude common non-code files
  - '\\.gif$'
  - '\\.png$'
  - '\\.jpg$'
  - '\\.jpeg$'
  - '\\.svg$'
  - '\\.ico$'
  - '\\.bcmap$'
  - '\\.dtd$'
  - '\\.tpl$'
  - '\\.txt$'
  - '\\.md$'
  - '\\.lock$'
  - '\\.log$'

# Konfigurasi tools
tools:
  pmd:
    enabled: true
    patterns:
      - '**/*.java'
  eslint:
    enabled: true
    patterns:
      - '**/*.js'
      - '**/*.jsx'
  phpmd:
    enabled: true
    patterns:
      - '**/*.php'

# Ignore low severity issues
reject-value: LOW
